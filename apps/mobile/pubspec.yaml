name: beadsmith
description: "Beadsmith — offline pixel-bead pattern generator (Flutter shell over the bead-core Rust engine)."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # Flutter's bundled localization delegates (Material/Cupertino/Widgets) for
  # gen-l10n. SDK-provided, no version.
  flutter_localizations:
    sdk: flutter

  # gen-l10n's generated app_localizations*.dart imports package:intl, so intl
  # must be a DIRECT dependency (else flutter_lints' depend_on_referenced_packages
  # fails analyze). NOT exact-pinned on purpose — flutter_localizations imposes a
  # hard SDK constraint on intl; follow its resolution, don't blindly bump.
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Pinned (exact, no caret) to known-good versions — a version bump can silently
  # change a load-bearing API shape, so pin guards against drift.
  image_picker: 1.2.2
  flutter_riverpod: 3.3.2
  go_router: 17.3.0

  # Pure-Dart codec + copyRotate/flipHorizontal/copyCrop for the self-drawn
  # cropper (apps/mobile only — must not leak into any crate). Exact-pinned.
  image: 4.9.1

  # MUST equal the Cargo `=2.12.0` pin so the runtime matches the M8 glue.
  flutter_rust_bridge: 2.12.0

  # Reuse the M8-generated pure-Dart glue (api.dart / frb_generated*) via path;
  # the App injects its own ExternalLibrary at init (see design D2).
  bead_ffi:
    path: ../../crates/bead-ffi/dart
  # Saves the generated preview/grid PNG to the device photo album so the
  # result survives a background kill. Exact-pinned like the rest.
  gal: 2.3.2

  # Cross-launch KV persistence for the settings page (palette / generator /
  # limit / despeckle / width). App-side only — MUST NOT leak into any crate.
  # Exact-pinned like the rest.
  shared_preferences: 2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # On-device integration tests (engine-on-iOS proof, tasks 3.1/3.2/6.2).
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Build-time launcher-icon generator (Android mipmaps + adaptive XML / iOS
  # AppIcon.appiconset). Exact-pinned like the rest of the repo. Config section
  # is added separately (group D / task 5.2).
  flutter_launcher_icons: 0.14.4

# Placeholder launcher icon config (group D / task 5.2). Source PNGs live in
# assets/icon/ (build-time only — deliberately NOT under `flutter: assets`, so
# the strict palette_assets_test isn't tripped). Regenerate the sources with
# tool/gen_placeholder_icon.py, then `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"          # base full-bleed square → Android legacy mipmap-*/ic_launcher.png + iOS fallback
  android: true
  adaptive_icon_foreground: "assets/icon/ic_foreground.png"  # heart in center safe zone, transparent margin
  adaptive_icon_background: "#FFF3E0"              # warm-cream ground (also shows through the bead holes)
  ios: true
  image_path_ios: "assets/icon/app_icon_ios.png"  # full-bleed, no alpha
  remove_alpha_ios: true                          # App Store rejects alpha in iOS icons

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Enables gen-l10n: `flutter pub get` / build runs codegen from l10n.yaml +
  # lib/l10n/*.arb into lib/l10n/app_localizations.dart (AppLocalizations).
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # 14 MIT-clean palettes: byte-exact copies of the top-level palettes/*.json
    # (no-BOM UTF-8), read at runtime via rootBundle and passed as paletteJson.
    # Listed ONE BY ONE on purpose — a `assets/palettes/` directory glob would
    # bundle ANY file dropped in (e.g. an AGPL _unlicensed/ palette), which a
    # "14 present & byte-equal" positive check can't catch. palette_assets_test
    # asserts the on-disk set is EXACTLY these 14. Drift from source fails `cmp`.
    - assets/palettes/mard.json
    - assets/palettes/artkal_s.json
    - assets/palettes/artkal_a.json
    - assets/palettes/artkal_c.json
    - assets/palettes/artkal_m.json
    - assets/palettes/artkal_r.json
    - assets/palettes/hama.json
    - assets/palettes/hama_maxi.json
    - assets/palettes/hama_mini.json
    - assets/palettes/perler.json
    - assets/palettes/perler_caps.json
    - assets/palettes/perler_mini.json
    - assets/palettes/nabbi.json
    - assets/palettes/yant.json
    # Fixture for the on-device integration test (byte-exact copy of
    # samples/gradient.png). Bundled because integration_test loads via rootBundle.
    - assets/test/gradient.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
